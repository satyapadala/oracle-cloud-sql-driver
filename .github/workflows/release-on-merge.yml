name: Release Jar On Main Merge

on:
  pull_request:
    types:
      - closed
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Check out merged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build shaded jar
        run: mvn -B package --file pom.xml

      - name: Compute release metadata
        id: release_meta
        run: |
          git fetch --force --tags
          LATEST_TAG="$(git tag --list 'v*' --sort=version:refname | tail -n 1)"
          if [ -z "${LATEST_TAG}" ]; then
            TAG="v0.0.1"
          else
            VERSION="${LATEST_TAG#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "${VERSION}"
            TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          NAME="${TAG}"
          ASSET="releaseArtifcats${TAG}.zip"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "name=${NAME}" >> "${GITHUB_OUTPUT}"
          echo "asset=${ASSET}" >> "${GITHUB_OUTPUT}"

      - name: Package release zip
        run: |
          rm -rf releaseArtifcats
          mkdir -p releaseArtifcats/OracleBICatalog
          mkdir -p releaseArtifcats/OFHSqlDriver_jar
          cp out/artifacts/OracleBICatalog/OracleCloudSQLQuery.catalog releaseArtifcats/OracleBICatalog/
          cp target/OFHSqlDriver-*.jar releaseArtifcats/OFHSqlDriver_jar/
          zip -r "${{ steps.release_meta.outputs.asset }}" releaseArtifcats

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          target_commitish: ${{ github.event.pull_request.merge_commit_sha }}
          name: ${{ steps.release_meta.outputs.name }}
          generate_release_notes: true
          files: |
            ${{ steps.release_meta.outputs.asset }}
